name: Generate Documentation

on:
  push:
    branches: [ '*' ]

jobs:
  generate-docs:
    runs-on: homelab-amd64
    container:
      image: gitea.main-server.home/electronya/electronya-firm-builder:latest

    env:
      NODE_TLS_REJECT_UNAUTHORIZED: '0'

    steps:
    - name: Configure SSH deploy key
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.ORG_ZEPHYR_DEPLOY_KEY }}" > ~/.ssh/id_ed25519
        chmod 600 ~/.ssh/id_ed25519
        ssh-keyscan -H gitea.main-server.home >> ~/.ssh/known_hosts 2>/dev/null || true

    - name: Debug SSH connectivity
      run: |
        nc -zv gitea.main-server.home 22 || echo "port 22 refused"
        cat /etc/resolv.conf

    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: true

    - name: Install Python documentation dependencies
      run: |
        python3 -m venv .venv
        . .venv/bin/activate
        pip install --quiet sphinx breathe myst-parser sphinx-rtd-theme sphinxcontrib-mermaid

    - name: Generate documentation
      run: |
        source .venv/bin/activate
        ./docs/generate.sh

    - name: Upload documentation artifact
      uses: actions/upload-artifact@v3
      with:
        name: documentation
        path: sphinx-out/
        retention-days: 30
